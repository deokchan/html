<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포토 슬라이드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Nanum+Brush+Script&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@500;700;900&family=Noto+Serif+KR:wght@600;700;900&family=Sunflower:wght@500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nanum Gothic', 'Malgun Gothic', sans-serif;
  background: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 24px 10px 40px;
}

h1 {
  color: #ddd;
  font-size: 17px;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
  text-align: center;
  font-weight: 400;
}

#slide-container {
  width: 100%;
  max-width: 920px;
}

/* ===== 디버그 정보 ===== */
#info-row {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 5px;
}
#chips-row {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 5px;
  align-items: center;
}
.chip {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 999px;
  border: 0.5px solid #555;
  background: #2a2a2a;
  color: #ccc;
}
.chip-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
#pal-row {
  display: flex;
  height: 16px;
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 8px;
}
#pal-row div { flex: 1; }
#dbg-row {
  font-size: 11px;
  color: #888;
  margin-bottom: 8px;
  line-height: 1.6;
}

/* #info-row, #chips-row, #pal-row, #dbg-row, #tabs { display: none; } */

/* ===== 배경 탭 ===== */
#tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 3px;
  flex-wrap: wrap;
}
button.tab {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 999px;
  cursor: pointer;
  border: 1px solid #666;
  background: transparent;
  color: #ccc;
  transition: background 0.2s, color 0.2s;
}
button.tab.on { color: #fff; }

/* ===== 슬라이드 본체 ===== */
.slide-wrap {
  padding: 10px;
  border-radius: 10px;
  overflow: hidden;
  border: 3px solid #888;
  transition: border-color 0.5s ease, background 0.5s ease;
}
table.sl {
  width: 100%;
  border-collapse: collapse; 
}
table.sl td { 
  padding: 0px;
  border: none;    /* ← 추가 */
}

#slide-img {
  border-radius: 6px;
  width: 100%;
  display: block;
  object-fit: cover;
  transition: opacity 3s ease;
  box-shadow: 2px 3px 6px red;  /*rgba(0,0,0,0.18); ← 추가 */
}
#slide-img.fade { opacity: 0; }

/* ===== 컨트롤 영역 ===== */
#controls {
  width: 100%;
  max-width: 920px;
  margin-top: 10px;
}

#ctrl-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.ctrl-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.15s, transform 0.1s;
  border-radius: 8px;
  overflow: hidden;
}
.ctrl-btn:hover { opacity: 0.8; }
.ctrl-btn:active { transform: scale(0.93); }
.ctrl-btn img { height: 40px; display: block; }
.ctrl-btn:focus,
.ctrl-btn:focus-visible { outline: none; }

#btn-play img { height: 40px; }

#count-progress-wrap {
  display: inline-block;
  text-align: center;
}
#count-display {
  letter-spacing: 0.05em;
  white-space: nowrap;
  margin-bottom: 4px;
  color: skyblue;
}

/* ===== 진행 바 ===== */
#progress-wrap {
  width: 100%;
  height: 5px;
  background: skyblue;
  border-radius: 3px;
  overflow: hidden;
}
#progress-bar {
  height: 100%;
  width: 0%;
  border-radius: 3px;
  background: linear-gradient(90deg, blue, red);
  transition: width 0.3s ease;
}

/* ===== 공통 폰트 ===== */
.cap-meta, #count-display {
  padding: 10px;
  font-size: 24px;
  font-weight: 700;
  line-height: 1.2;
  font-family: 'Noto Serif KR';
}
#count-display {
  padding: 5px;
  font-size: 20px;
  line-height: 1.0;
}
</style>
</head>
<body>

<h1>260328 양양의 노래 &amp; 자연과 풍경</h1>

<div id="slide-container">

  <!-- 디버그 정보 (필요시 display:none 처리) -->
  <div id="info-row"></div>
  <div id="chips-row"></div>
  <div id="pal-row"></div>
  <div id="dbg-row"></div>

  <!-- 배경색 탭 -->
  <div id="tabs"></div>

  <!-- 슬라이드 본체 -->
  <div class="slide-wrap" id="slide-wrap">
    <table class="sl" id="slide-table">
      <tr><td class="sl_td">
        <img id="slide-img" src="" alt="">
      </td></tr>
      <tr><td class="cap" id="cap">
        <div class="cap-meta" id="cap-meta"></div>
      </td></tr>
    </table>
  </div>

</div><!-- /slide-container -->

<!-- 컨트롤 -->
<div id="controls">
  <div id="ctrl-row">

    <button class="ctrl-btn" id="btn-play" onclick="img_control()" title="일시 정지">
      <img id="img_button_img" src="https://i.imgur.com/TQFP08p.png" alt="재생">
      <input type="text" style="display:none" id="img_button" value="start">
    </button>

    <button class="ctrl-btn" id="btn-random" onclick="img_Random()" title="랜덤 재생">
      <img id="img_RS_button_img" src="https://i.imgur.com/LOi8XuQ.png" alt="순차">
      <input type="text" style="display:none" id="img_RS_button" value="sequence">
    </button>

    <button class="ctrl-btn" onclick="img_Prev()" title="이전">
      <img src="https://i.imgur.com/4pZ3zXN.png" alt="">
      <img src="https://i.imgur.com/tkZvFNw.png" alt="">
    </button>

    <button class="ctrl-btn" onclick="img_Next()" title="다음">
      <img src="https://i.imgur.com/mNMdXMC.png" alt="">
      <img src="https://i.imgur.com/TFw4TDC.png" alt="">
    </button>

    <div id="count-progress-wrap" style="margin-left:auto;">
      <div id="count-display">[ - / - ]</div>
      <div id="progress-wrap">
        <div id="progress-bar"></div>
      </div>
    </div>

  </div>
</div>

<canvas id="cv" style="display:none"></canvas>

<script src="https://cdn.jsdelivr.net/gh/deokchan/js@latest/slide.js"></script>

<script>
/* ===================================================
   포토 슬라이드 — 무작위 색상 조합 자동 변경
   =================================================== */

// ── 색상 팔레트 — 폰트색 + 배경색 세트 (대비/조화 검증된 조합) ──
// 구조: { font: 폰트색, bg: 배경색, border: 테두리색, label: 설명 }
const COLOR_SETS = [
  { font:'#7B3F00', bg:'#FFF8E7', border:'#D4A96A', label:'올리브 브라운 / 크림' },
  { font:'#1B4F72', bg:'#EAF4FB', border:'#7FB3D3', label:'딥 블루 / 연하늘' },
  { font:'#6B2D8B', bg:'#F5EEF8', border:'#C39BD3', label:'퍼플 / 라벤더' },
  { font:'#1E8449', bg:'#EAFAF1', border:'#7DCEA0', label:'딥 그린 / 민트' },
  { font:'#B03A2E', bg:'#FDEDEC', border:'#F1948A', label:'다크 레드 / 연분홍' },
  { font:'#117A65', bg:'#E8F8F5', border:'#76D7C4', label:'틸 / 연민트' },
  { font:'#784212', bg:'#FEF9E7', border:'#F8C471', label:'번트 오렌지 / 연노랑' },
  { font:'#1A5276', bg:'#EBF5FB', border:'#85C1E9', label:'네이비 / 스카이' },
  { font:'#76448A', bg:'#F4ECF7', border:'#BB8FCE', label:'바이올렛 / 연보라' },
  { font:'#1D6A39', bg:'#E9F7EF', border:'#82E0AA', label:'포레스트 그린 / 연녹' },
  { font:'#922B21', bg:'#FDEDEC', border:'#EC7063', label:'크림슨 / 살구' },
  { font:'#5D4037', bg:'#EFEBE9', border:'#A1887F', label:'모카 브라운 / 베이지' },
  { font:'#0E6655', bg:'#E8F8F5', border:'#48C9B0', label:'에메랄드 / 민트' },
  { font:'#6E2F8B', bg:'#F3E5F5', border:'#CE93D8', label:'딥 퍼플 / 연보라' },
  { font:'#1F618D', bg:'#EBF5FB', border:'#5DADE2', label:'코발트 / 연파랑' },
  { font:'#B7770D', bg:'#FDFAE5', border:'#F4D03F', label:'골드 / 크림옐로우' },
  { font:'#283747', bg:'#EAF2FF', border:'#85A9D4', label:'차콜 / 연슬레이트' },
  { font:'#7D6608', bg:'#FEFDE7', border:'#D4AC0D', label:'올리브 / 연황금' },
  { font:'#4A235A', bg:'#F5EEF8', border:'#A569BD', label:'인디고 퍼플 / 연라벤더' },
  { font:'#0B5345', bg:'#E8F8F5', border:'#52BE80', label:'딥 틸 / 페일 민트' },
  { font:'#4A235A', bg:'#F5EEF8', border:'#A569BD', label:'인디고 퍼플 / 연라벤더' },
];

// ── 상태 변수 ───────────────────────────────────────────
const INTERVAL       = 10000;
let   curIdx         = 0;
let   isPlaying      = true;
let   isRandom       = false;
let   timer          = null;
let   colorSetIdx    = 0;   // 현재 적용 중인 COLOR_SETS 인덱스
let   usedColorIdxs  = [];  // 중복 방지용

// ── 다음 색상 세트 선택 (직전과 겹치지 않게) ───────────
function pickNextColorSet() {
  let next;
  do {
    next = Math.floor(Math.random() * COLOR_SETS.length);
  } while (next === colorSetIdx);
  colorSetIdx = next;
  return COLOR_SETS[next];
}

// ── 파일명 파싱 ────────────────────────────────────────
function parseImgName(url) {
  const decoded = url.split('/').pop();
  const base    = decoded.replace(/\.(jpg|jpeg|png|webp|gif)$/i, '');
  const parts   = base.split('_');
  const rawDate = parts[0] || '';
  const rawTime = parts[1] || '';
  const rawCap  = parts.slice(2).join('_');

  let iDate = rawDate;
  if (/^\d{6}$/.test(rawDate)) {
    iDate = rawDate.slice(0,2) + rawDate.slice(2,4) + rawDate.slice(4,6);
  }

  let iTime = rawTime;
  if (/^\d{6}$/.test(rawTime)) {
    iTime = rawTime.slice(0,2)+':'+rawTime.slice(2,4)+':'+rawTime.slice(4,6);
  } else if (/^\d{4}$/.test(rawTime)) {
    iTime = rawTime.slice(0,2)+':'+rawTime.slice(2,4);
  }

  let mainCap = rawCap;
  let subCap  = '';
  const parenMatch = rawCap.match(/^(.*?)\s*\((.+?)\)\s*(\d+)?\s*$/);
  if (parenMatch) {
    const suffix = parenMatch[3] ? ' ' + parenMatch[3] : '';
    mainCap = (parenMatch[1] + suffix).trim();
    subCap  = '부제 : ' + parenMatch[2].trim();
  }

  return { iDate, iTime, mainCap, subCap };
}

// ── UI 적용 ────────────────────────────────────────────
function applyColorSet(cs) {
  document.getElementById('slide-wrap').style.borderColor   = cs.border;
  document.getElementById('slide-wrap').style.background   = cs.bg;
  document.getElementById('slide-table').style.background   = cs.bg;
  const cap = document.getElementById('cap');
  cap.style.background = cs.bg;
  cap.style.color      = cs.font;
  cap.style.borderTop  = `2px solid ${cs.border}`;

  // 디버그
  document.getElementById('info-row').innerHTML =
    `<span style="display:inline-block;width:12px;height:12px;background:${cs.font};border-radius:50%;margin-right:4px;vertical-align:middle;"></span>` +
    `폰트 <b>${cs.font}</b> &nbsp;/&nbsp; ` +
    `<span style="display:inline-block;width:12px;height:12px;background:${cs.bg};border:1px solid #aaa;border-radius:50%;margin-right:4px;vertical-align:middle;"></span>` +
    `배경 <b>${cs.bg}</b> &nbsp;— ${cs.label}`;
  document.getElementById('chips-row').innerHTML = '';
  document.getElementById('pal-row').innerHTML =
    COLOR_SETS.map((c,i) =>
      `<div style="background:${c.bg};border-bottom:3px solid ${c.font};${i===colorSetIdx?'outline:2px solid #333;':''}cursor:pointer;" title="${c.label}" onclick="manualSelectColor(${i})"></div>`
    ).join('');
  document.getElementById('dbg-row').textContent = `색상 세트 ${colorSetIdx+1} / ${COLOR_SETS.length}  — ${cs.label}`;
}

// 팔레트 클릭으로 수동 선택
function manualSelectColor(idx) {
  colorSetIdx = idx;
  applyColorSet(COLOR_SETS[idx]);
}

function updateCaption(idx) {
  const {iDate, iTime, mainCap, subCap} = parseImgName(img[idx]);
  const capText = mainCap.replace(/-/g, '<br>-') + (subCap ? '<br>' + subCap : '');
  document.getElementById('cap-meta').innerHTML = `${iDate}&nbsp;${iTime}&nbsp;${capText}`;
  document.getElementById('count-display').textContent = `[ ${idx+1} / ${img.length} ]`;
  document.getElementById('progress-bar').style.width = ((idx+1) / img.length * 100).toFixed(1) + '%';
}

// ── 이미지 로드 ────────────────────────────────────────
function loadSlide(idx, callback) {
  const el  = document.getElementById('slide-img');
  const url = img[idx];

  el.classList.add('fade');  // 서서히 사라짐 시작

  const cs     = pickNextColorSet();
  const newImg = new Image();

  newImg.onload = function() {
    // 사라지는 애니메이션(1.2s) 완료 후 이미지 교체
    setTimeout(() => {
      el.src = url;
      applyColorSet(cs);
      updateCaption(idx);
      // 교체 직후 서서히 나타남
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          el.classList.remove('fade');
          if (callback) callback();
        });
      });
    }, 2000);  /* CSS transition 시간과 일치 */
  };

  newImg.onerror = function() {
    setTimeout(() => {
      el.src = url;
      el.classList.remove('fade');
      applyColorSet(cs);
      updateCaption(idx);
      if (callback) callback();
    }, 2000);
  };

  newImg.src = url;
}

// ── 자동재생 ───────────────────────────────────────────
function scheduleNext() {
  clearTimeout(timer);
  if (!isPlaying) return;
  timer = setTimeout(() => { advanceSlide(); }, INTERVAL);
}

function advanceSlide() {
  if (isRandom) {
    let next;
    do { next = Math.floor(Math.random() * img.length); } while (img.length > 1 && next === curIdx);
    curIdx = next;
  } else {
    curIdx = (curIdx + 1) % img.length;
  }
  loadSlide(curIdx, scheduleNext);
}

// ── 버튼 함수 ──────────────────────────────────────────
function img_control() {
  isPlaying = !isPlaying;
  const btnImg = document.getElementById('img_button_img');
  const btnVal = document.getElementById('img_button');
  if (isPlaying) {
    btnImg.src   = 'https://i.imgur.com/TQFP08p.png';
    btnImg.title = '일시 정지';
    btnVal.value = 'start';
    scheduleNext();
  } else {
    btnImg.src   = 'https://i.imgur.com/mNMdXMC.png';
    btnImg.title = '재생';
    btnVal.value = 'stop';
    clearTimeout(timer);
  }
}

function img_Random() {
  isRandom = !isRandom;
  const btnImg = document.getElementById('img_RS_button_img');
  const btnVal = document.getElementById('img_RS_button');
  if (isRandom) {
    btnImg.src   = 'https://i.imgur.com/Au17Uxe.png';
    btnImg.title = '순차 재생으로 전환';
    btnVal.value = 'random';
  } else {
    btnImg.src   = 'https://i.imgur.com/LOi8XuQ.png';
    btnImg.title = '랜덤 재생으로 전환';
    btnVal.value = 'sequence';
  }
}

function img_Prev() {
  clearTimeout(timer);
  curIdx = (curIdx - 1 + img.length) % img.length;
  loadSlide(curIdx, () => { if (isPlaying) scheduleNext(); });
}

function img_Next() {
  clearTimeout(timer);
  curIdx = (curIdx + 1) % img.length;
  loadSlide(curIdx, () => { if (isPlaying) scheduleNext(); });
}

// ── 초기 실행 ──────────────────────────────────────────
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => loadSlide(curIdx, scheduleNext));
} else {
  loadSlide(curIdx, scheduleNext);
}
</script>
</body>
</html>
